# EntroTunnel reverse proxy for tun1.hydeng.cn.
#
# nginx terminates TLS for the domain and proxies two things to local backends:
#   * the WebSocket tunnel  → 127.0.0.1:8444  (entrotunnel `ws` listener, tls=false)
#   * the web admin panel    → 127.0.0.1:9000  (exposed at /panel/, API at /api/)
#
# Only an Upgrade request reaches the tunnel backend; a plain / HTTP-2 probe gets
# a clean 200 instead of a 502 (HTTP-2 can't carry the WebSocket `Upgrade`
# header, so a browser/curl hitting the URL would otherwise look "broken" — the
# real client uses HTTP/1.1 and tunnels fine).
#
# Place this in /etc/nginx/conf.d/ (port 80), then obtain the certificate with:
#   certbot --nginx -d tun1.hydeng.cn --redirect
# certbot carries every `location` below into a new 443 TLS server block and adds
# an 80->443 redirect, so the tunnel AND the admin panel end up on HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name tun1.hydeng.cn;

    # --- Web admin (token-gated), reverse-proxied out at /panel/ ---
    location = /panel { return 301 /panel/; }
    location /panel/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
    }

    # --- Tunnel WebSocket backend (catch-all; carries the client's /et path) ---
    location / {
        if ($http_upgrade = "") {
            add_header Content-Type text/plain always;
            return 200 "EntroTunnel WebSocket endpoint is up. Point a client at wss://$host/ (transport=ws, port=443).\n";
        }
        proxy_pass http://127.0.0.1:8444;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;                   # keep long-lived tunnels open
        proxy_send_timeout 3600s;
    }
}
